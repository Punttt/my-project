<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-project</title>
    <link rel="stylesheet" href="/src/css/main.css">
  </head>
  <body>
    <main>
      <section id="course-section">
        <form id="course-form">
          <label for="name">Kursnamn:</label>
          <input type="name" id="name">
          <br>

          <label for="code">Kurskod:</label>
          <input type="text" id="code">
          <br>

          <label for="progression">Progression:</label>
          <select name="progression" id="progression">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
          </select>
          <br>

          <label for="syllabus">Kursplan (URL):</label>
          <input type="url" id="syllabus">
          <br>

          <button type="submit" id="submitBtn">Lägg till kurs</button>
        </form>
      </section>



    </main>
    <script type="module" src="/src/js/main.ts"></script>
  </body>
</html>
